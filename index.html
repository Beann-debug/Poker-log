<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Poker Log">
<meta name="theme-color" content="#0a1a0f">
<title>Poker Log</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
:root{--gold:#c8b97a;--bg:#07120a;--card-bg:#f5f0e8;--red:#e05252;--green:#4caf50;--text:#e8e0d0;--muted:#667}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Georgia',serif;overscroll-behavior:none}
#app{height:100%;display:flex;flex-direction:column}
header{background:linear-gradient(180deg,#0d2a18,#091509);border-bottom:1px solid rgba(200,185,122,.2);padding:env(safe-area-inset-top,0) 0 0;flex-shrink:0}
.header-inner{padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:20px;letter-spacing:3px;color:var(--gold);font-variant:small-caps}
.stats-bar{display:flex;justify-content:space-around;padding:8px 0 12px;border-top:1px solid rgba(200,185,122,.1)}
.stat{text-align:center}.stat-val{font-size:18px;font-weight:bold;line-height:1}
.stat-lbl{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:2px;font-family:sans-serif}
.tabs{display:flex;border-bottom:1px solid rgba(200,185,122,.15);flex-shrink:0;background:#091509}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:12px;font-family:sans-serif;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.panel{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(env(safe-area-inset-bottom,0) + 14px)}
.panel.hidden{display:none}
.sec-label{font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:8px;font-family:sans-serif}
.card-row{display:flex;justify-content:center;gap:18px;margin-bottom:20px;padding:16px 0}
.card-btn{width:58px;height:82px;border-radius:9px;border:2px dashed rgba(200,185,122,.35);background:rgba(255,255,255,.04);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Georgia',serif;font-weight:bold;transition:all .2s;-webkit-user-select:none}
.card-btn.filled{background:var(--card-bg);border:2px solid var(--gold);box-shadow:0 4px 14px rgba(0,0,0,.5)}
.card-btn .rank{font-size:20px;line-height:1}.card-btn .suit{font-size:22px;line-height:1}.card-btn .plus{font-size:26px;color:rgba(200,185,122,.4)}
.picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.picker-sheet{background:#111;border-radius:16px 16px 0 0;padding:16px 14px;width:100%;max-width:480px;padding-bottom:calc(env(safe-area-inset-bottom,0) + 16px)}
.picker-title{font-size:13px;color:var(--gold);letter-spacing:2px;text-align:center;margin-bottom:12px;font-family:sans-serif}
.suit-row{display:flex;gap:4px;flex-wrap:nowrap;justify-content:center;margin-bottom:6px}
.rank-btn{width:24px;height:24px;border-radius:4px;border:none;cursor:pointer;font-size:10px;font-weight:bold;font-family:'Georgia',serif;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0}
.clear-btn{width:100%;padding:10px;background:rgba(224,82,82,.15);border:1px solid var(--red);border-radius:8px;color:var(--red);cursor:pointer;font-size:13px;margin-top:8px;font-family:sans-serif}
.cancel-btn{width:100%;padding:10px;background:rgba(255,255,255,.05);border:1px solid #333;border-radius:8px;color:#888;cursor:pointer;font-size:13px;margin-top:6px;font-family:sans-serif}
.btn-group{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.tog-btn{padding:7px 13px;border-radius:20px;border:1px solid rgba(255,255,255,.12);background:transparent;color:#666;cursor:pointer;font-size:12px;font-family:sans-serif;transition:all .15s;-webkit-user-select:none}
.tog-btn.on{border-color:var(--gold);background:rgba(200,185,122,.15);color:var(--gold)}
.tog-btn.win.on{border-color:var(--green);background:rgba(76,175,80,.15);color:var(--green)}
.tog-btn.loss.on{border-color:var(--red);background:rgba(224,82,82,.15);color:var(--red)}
.tog-btn.fold.on{border-color:#888;background:rgba(128,128,128,.15);color:#999}
input,textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(200,185,122,.2);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;font-family:sans-serif;margin-bottom:14px;outline:none}
input:focus,textarea:focus{border-color:rgba(200,185,122,.5)}
textarea{resize:none;line-height:1.5}
.save-btn{width:100%;padding:15px;border-radius:11px;border:none;font-size:15px;font-weight:bold;letter-spacing:1px;cursor:pointer;font-family:sans-serif;transition:all .2s}
.save-btn.ready{background:linear-gradient(135deg,#c8b97a,#a89458);color:#080e08}
.save-btn.done{background:rgba(76,175,80,.3);color:var(--green);border:1px solid var(--green)}
.save-btn.disabled{background:rgba(255,255,255,.05);color:#444;cursor:not-allowed}
.hand-item{background:rgba(255,255,255,.04);border:1px solid rgba(200,185,122,.15);border-radius:10px;padding:11px 12px;margin-bottom:10px;display:flex;gap:10px;align-items:center}
.mini-card{width:34px;height:47px;background:var(--card-bg);border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.5);flex-shrink:0}
.mini-card .r{font-size:12px;line-height:1;font-family:'Georgia',serif;font-weight:bold}
.mini-card .s{font-size:14px;line-height:1;font-family:'Georgia',serif}
.mini-card.empty{background:rgba(255,255,255,.04);border:1px dashed #333}
.hand-meta{flex:1;min-width:0}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:3px}
.tag{font-size:10px;padding:2px 8px;border-radius:20px;font-family:sans-serif}
.tag.pos{background:rgba(200,185,122,.12);color:var(--gold);border:1px solid rgba(200,185,122,.25)}
.tag.act{background:rgba(255,255,255,.06);color:#888}
.tag.win{background:rgba(76,175,80,.15);color:var(--green)}
.tag.loss{background:rgba(224,82,82,.15);color:var(--red)}
.tag.even{background:rgba(200,185,122,.1);color:var(--gold)}
.tag.fold{background:rgba(128,128,128,.1);color:#777}
.tag.pot{color:#666}
.hand-note{font-size:11px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:sans-serif}
.hand-time{font-size:10px;color:#444;font-family:sans-serif;margin-top:2px}
.del-btn{background:none;border:none;color:#444;cursor:pointer;font-size:18px;padding:4px 6px;border-radius:4px;flex-shrink:0;line-height:1}
.empty{text-align:center;padding:50px 20px;color:#444}
.empty .icon{font-size:48px;margin-bottom:12px}
.empty p{font-size:13px;font-family:sans-serif;line-height:1.6}
.hist-top{display:flex;justify-content:flex-end;margin-bottom:10px}
.clear-all{font-size:11px;color:var(--red);background:rgba(224,82,82,.1);border:1px solid rgba(224,82,82,.3);border-radius:6px;padding:5px 10px;cursor:pointer;font-family:sans-serif}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-inner">
      <div class="logo">♠ Poker Log ♣</div>
      <div style="font-size:11px;color:#555;letter-spacing:1px;font-family:sans-serif">手牌記錄本</div>
    </div>
    <div class="stats-bar">
      <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">總記錄</div></div>
      <div class="stat"><div class="stat-val" style="color:#4caf50" id="s-wins">0</div><div class="stat-lbl">勝場</div></div>
      <div class="stat"><div class="stat-val" style="color:#e05252" id="s-losses">0</div><div class="stat-lbl">敗場</div></div>
      <div class="stat"><div class="stat-val" style="color:#c8b97a" id="s-rate">—</div><div class="stat-lbl">勝率</div></div>
    </div>
  </header>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('record')">📝 記錄手牌</button>
    <button class="tab" onclick="switchTab('history')" id="hist-tab">📖 歷史記錄</button>
  </div>
  <div class="panel" id="panel-record">
    <div class="sec-label" style="text-align:center">點擊選牌</div>
    <div class="card-row">
      <button class="card-btn" id="card1-btn" onclick="openPicker(1)"><span class="plus">+</span></button>
      <button class="card-btn" id="card2-btn" onclick="openPicker(2)"><span class="plus">+</span></button>
    </div>
    <div class="sec-label">位置</div>
    <div class="btn-group" id="pos-group">
      <button class="tog-btn" data-val="UTG" onclick="toggle(this,'pos')">UTG</button>
      <button class="tog-btn" data-val="UTG+1" onclick="toggle(this,'pos')">UTG+1</button>
      <button class="tog-btn" data-val="MP" onclick="toggle(this,'pos')">MP</button>
      <button class="tog-btn" data-val="HJ" onclick="toggle(this,'pos')">HJ</button>
      <button class="tog-btn" data-val="CO" onclick="toggle(this,'pos')">CO</button>
      <button class="tog-btn" data-val="BTN" onclick="toggle(this,'pos')">BTN</button>
      <button class="tog-btn" data-val="SB" onclick="toggle(this,'pos')">SB</button>
      <button class="tog-btn" data-val="BB" onclick="toggle(this,'pos')">BB</button>
    </div>
    <div class="sec-label">翻牌前行動</div>
    <div class="btn-group" id="act-group">
      <button class="tog-btn" data-val="Raise" onclick="toggle(this,'act')">Raise</button>
      <button class="tog-btn" data-val="Call" onclick="toggle(this,'act')">Call</button>
      <button class="tog-btn" data-val="Limp" onclick="toggle(this,'act')">Limp</button>
      <button class="tog-btn" data-val="Fold" onclick="toggle(this,'act')">Fold PF</button>
    </div>
    <div class="sec-label">結果</div>
    <div class="btn-group" id="res-group">
      <button class="tog-btn win" data-val="Win" onclick="toggle(this,'res')">Win ✓</button>
      <button class="tog-btn loss" data-val="Loss" onclick="toggle(this,'res')">Loss ✗</button>
      <button class="tog-btn" data-val="Break-even" onclick="toggle(this,'res')">平手</button>
      <button class="tog-btn fold" data-val="Folded" onclick="toggle(this,'res')">棄牌</button>
    </div>
    <div class="sec-label">鍋底 (BB)</div>
    <input type="number" id="pot-input" placeholder="e.g. 12" inputmode="decimal">
    <div class="sec-label">備註</div>
    <textarea id="note-input" rows="2" placeholder="公共牌、對手行為、心得…"></textarea>
    <button class="save-btn disabled" id="save-btn" onclick="saveHand()">選牌後儲存</button>
  </div>
  <div class="panel hidden" id="panel-history">
    <div id="history-list"></div>
  </div>
</div>

<div class="picker-overlay hidden" id="picker-overlay" onclick="closePicker(event)">
  <div class="picker-sheet" onclick="event.stopPropagation()">
    <div class="picker-title" id="picker-title">選擇手牌</div>
    <div id="picker-suits"></div>
    <button class="clear-btn" id="picker-clear" onclick="clearCard()">清除選牌</button>
    <button class="cancel-btn" onclick="closePicker()">取消</button>
  </div>
</div>

<script>
const SUITS=['♠','♥','♦','♣'],RANKS=['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
let state={card1:null,card2:null,pos:'',act:'',res:''};
let hands=[],pickerSlot=0,currentTab='record';
try{hands=JSON.parse(localStorage.getItem('pokerHands')||'[]');}catch{}

function save(){
  try{localStorage.setItem('pokerHands',JSON.stringify(hands));}catch{}
  updateStats();if(currentTab==='history')renderHistory();
}
function updateStats(){
  const t=hands.length,w=hands.filter(h=>h.res==='Win').length,l=hands.filter(h=>h.res==='Loss').length;
  const p=hands.filter(h=>['Win','Loss','Break-even'].includes(h.res)).length;
  document.getElementById('s-total').textContent=t;
  document.getElementById('s-wins').textContent=w;
  document.getElementById('s-losses').textContent=l;
  document.getElementById('s-rate').textContent=p?Math.round(w/p*100)+'%':'—';
  document.getElementById('hist-tab').textContent='📖 歷史記錄'+(t?` (${t})`:'');
}
function isRed(s){return s==='♥'||s==='♦'}
function renderCard(btn,val){
  if(!val){btn.className='card-btn';btn.innerHTML='<span class="plus">+</span>';return;}
  const r=val.slice(0,-1),s=val.slice(-1),c=isRed(s)?'#cc3333':'#1a1a1a';
  btn.className='card-btn filled';
  btn.innerHTML=`<span class="rank" style="color:${c}">${r}</span><span class="suit" style="color:${c}">${s}</span>`;
}
function updateSaveBtn(){
  const btn=document.getElementById('save-btn');
  if(state.card1&&state.card2){btn.className='save-btn ready';btn.textContent='儲存手牌';}
  else{btn.className='save-btn disabled';btn.textContent='選牌後儲存';}
}
function toggle(btn,group){
  const gMap={pos:'pos-group',act:'act-group',res:'res-group'};
  if(state[group]===btn.dataset.val){state[group]='';btn.classList.remove('on');}
  else{document.getElementById(gMap[group]).querySelectorAll('.tog-btn').forEach(b=>b.classList.remove('on'));state[group]=btn.dataset.val;btn.classList.add('on');}
}
function openPicker(slot){
  pickerSlot=slot;
  document.getElementById('picker-title').textContent=`選擇第 ${slot} 張牌`;
  document.getElementById('picker-overlay').classList.remove('hidden');
  buildPicker();
}
function closePicker(e){
  if(!e||e.target===document.getElementById('picker-overlay'))document.getElementById('picker-overlay').classList.add('hidden');
}
function clearCard(){
  state['card'+pickerSlot]=null;renderCard(document.getElementById('card'+pickerSlot+'-btn'),null);
  updateSaveBtn();document.getElementById('picker-overlay').classList.add('hidden');
}
function buildPicker(){
  const cur=state['card'+pickerSlot],other=state['card'+(pickerSlot===1?2:1)];
  const c=document.getElementById('picker-suits');c.innerHTML='';
  SUITS.forEach(s=>{
    const row=document.createElement('div');row.className='suit-row';
    RANKS.forEach(r=>{
      const val=r+s,isO=val===other,isSel=val===cur,col=isRed(s)?'#cc4444':'#ddd';
      const btn=document.createElement('button');btn.className='rank-btn';
      btn.style.cssText=`background:${isSel?'#c8b97a':isO?'rgba(255,255,255,.03)':'rgba(255,255,255,.1)'};color:${isSel?'#000':col};opacity:${isO?.2:1}`;
      btn.disabled=isO;
      btn.innerHTML=`<span style="font-size:11px;line-height:1">${r}</span><span style="font-size:9px;line-height:1">${s}</span>`;
      btn.onclick=()=>{state['card'+pickerSlot]=val;renderCard(document.getElementById('card'+pickerSlot+'-btn'),val);updateSaveBtn();document.getElementById('picker-overlay').classList.add('hidden');};
      row.appendChild(btn);
    });
    c.appendChild(row);
  });
  document.getElementById('picker-clear').style.display=cur?'block':'none';
}
function saveHand(){
  if(!state.card1||!state.card2)return;
  hands.unshift({id:Date.now(),card1:state.card1,card2:state.card2,pos:state.pos,act:state.act,res:state.res,
    pot:document.getElementById('pot-input').value,note:document.getElementById('note-input').value,
    time:new Date().toLocaleString('zh-TW')});
  save();
  state={card1:null,card2:null,pos:'',act:'',res:''};
  renderCard(document.getElementById('card1-btn'),null);renderCard(document.getElementById('card2-btn'),null);
  document.querySelectorAll('.tog-btn.on').forEach(b=>b.classList.remove('on'));
  document.getElementById('pot-input').value='';document.getElementById('note-input').value='';
  updateSaveBtn();
  const btn=document.getElementById('save-btn');btn.className='save-btn done';btn.textContent='✓ 已儲存！';
  setTimeout(()=>updateSaveBtn(),1500);
}
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='record'?0:1)));
  document.getElementById('panel-record').classList.toggle('hidden',tab!=='record');
  document.getElementById('panel-history').classList.toggle('hidden',tab!=='history');
  if(tab==='history')renderHistory();
}
function renderHistory(){
  const el=document.getElementById('history-list');
  if(!hands.length){el.innerHTML='<div class="empty"><div class="icon">🃏</div><p>還沒有記錄的手牌<br>切換到「記錄手牌」開始吧！</p></div>';return;}
  const rc={Win:'win',Loss:'loss','Break-even':'even',Folded:'fold'};
  const bc={Win:'#4caf50',Loss:'#e05252','Break-even':'#c8b97a'};
  el.innerHTML='<div class="hist-top"><button class="clear-all" onclick="clearAll()">清除全部</button></div>'+
    hands.map(h=>{
      const mc=v=>v?`<div class="mini-card"><span class="r" style="color:${isRed(v.slice(-1))?'#cc3333':'#1a1a1a'}">${v.slice(0,-1)}</span><span class="s" style="color:${isRed(v.slice(-1))?'#cc3333':'#1a1a1a'}">${v.slice(-1)}</span></div>`:'<div class="mini-card empty"></div>';
      const tags=[h.pos?`<span class="tag pos">${h.pos}</span>`:'',h.act?`<span class="tag act">${h.act}</span>`:'',h.res?`<span class="tag ${rc[h.res]||''}">${h.res}</span>`:'',h.pot?`<span class="tag pot">🍀 ${h.pot}BB</span>`:''].filter(Boolean).join('');
      return `<div class="hand-item" style="border-left:3px solid ${bc[h.res]||'#333'}"><div style="display:flex;gap:4px">${mc(h.card1)}${mc(h.card2)}</div><div class="hand-meta"><div class="tags">${tags}</div>${h.note?`<div class="hand-note">${h.note}</div>`:''}<div class="hand-time">${h.time}</div></div><button class="del-btn" onclick="deleteHand(${h.id})">×</button></div>`;
    }).join('');
}
function deleteHand(id){hands=hands.filter(h=>h.id!==id);save();renderHistory();}
function clearAll(){if(confirm('確定清除所有手牌記錄？')){hands=[];save();renderHistory();}}
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
updateStats();updateSaveBtn();
</script>
</body>
</html>
